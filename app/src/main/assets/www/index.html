<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chordynaut 🎹 - Cosmic Chord Synthesizer</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmic: {
                            bg: '#0a0a0f',
                            panel: '#1a1a2e',
                            accent: '#16213e',
                            highlight: '#0f3460',
                            glow: '#e94560',
                            secondary: '#533483',
                            tertiary: '#2ec4b6'
                        }
                    }
                }
            }
        }
    </script>
    <script>
        // Defensive JS patch: disable iOS long-press actions globally
        document.addEventListener('DOMContentLoaded', function() {
            document.addEventListener('gesturestart', (e) => e.preventDefault());
            document.addEventListener('selectstart', (e) => e.preventDefault());
            document.addEventListener('contextmenu', (e) => e.preventDefault());
        });

        // Centralized layout recomputation function
        function recomputeLayout() {
            const topBar = document.querySelector('.top-bar');
            const grid = document.querySelector('.chord-grid');
            if (!grid || !topBar) return;

            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const topBarHeight = topBar.getBoundingClientRect().height;
            
            // Get safe area inset bottom
            const safeAreaStyle = getComputedStyle(document.documentElement).getPropertyValue('padding-bottom');
            const safeArea = parseFloat(safeAreaStyle) || 0;
            
            const availableHeight = vh - topBarHeight - safeArea;
            grid.style.height = `${availableHeight}px`;
        }

        // Call recomputeLayout on various events
        window.addEventListener('load', () => {
            requestAnimationFrame(recomputeLayout);
        });

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', recomputeLayout);
        } else {
            window.addEventListener('resize', recomputeLayout);
        }

        window.addEventListener('orientationchange', () => {
            setTimeout(recomputeLayout, 100);
        });

        if (document.fonts) {
            document.fonts.ready.then(recomputeLayout);
        }

        // Export for use after overlay toggles
        window.recomputeLayout = recomputeLayout;
    </script>
</head>
<body oncontextmenu="return false;" spellcheck="false" autocorrect="off" class="bg-cosmic-bg text-white overflow-hidden">
    <div class="neon-bar"></div>
    <div id="orientation-lock" class="fixed inset-0 bg-cosmic-bg z-50 hidden flex-col items-center justify-center p-8 text-center">
        <img src="https://decentricity.github.io/1760829170789.jpg" alt="Chordynaut Logo" style="width: 120px; height: 120px; margin-bottom: 20px; border-radius: 12px; object-fit: cover;">
        <div class="text-6xl mb-6">📱 → 🔄</div>
        <h2 class="text-2xl font-bold mb-4">Please Rotate Your Device</h2>
        <p class="text-gray-400">Chordynaut needs landscape only in fullscreen mode</p>
    </div>
    <div id="root"></div>
    <script src="app.js"></script>
</body>
</html>
